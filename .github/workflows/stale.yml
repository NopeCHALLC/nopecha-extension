name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          exempt-all-pr-assignees: true
          exempt-issue-labels: enhancement,feature request,bug,triaged
          days-before-stale: 14
          days-before-close: 3
